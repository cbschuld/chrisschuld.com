  "jobTitle": "SaaS Entrepreneur & Software Engineer",

{% if page.layout == 'landing' %}
<!-- SoftwareApplication Schema for Products -->
{% for product in site.data.products %}
{% unless product.status == 'coming_soon' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "{{ product.name }}",
  "url": "{{ product.url }}",
  "description": "{{ product.description | strip_newlines }}",
  "applicationCategory": "WebApplication",
  "operatingSystem": "Any",
  "author": {
    "@type": "Person",
    "name": "Chris Schuld",
    "url": "https://chrisschuld.com"
  },
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "USD"
  }
}
</script>
{% endunless %}
{% endfor %}
{% endif %}
